on: 
  push:
    branches:
      - main
      - dev
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v2
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.1.0
      with:
        server: REDACTED
        username: REDACTED
        password: ${{ secrets.REDACTED_netcup }}
        server-dir: /var/www/html/REDACTED/Turnierwebsite/tourna/
